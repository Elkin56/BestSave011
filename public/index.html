<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>BestSave</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050805; --surf:#0C120C; --surf-hi:#131B13;
    --line:#1D2A1D; --line-lit:#2A3D2A;
    --txt:#E9F5E9; --txt-lo:#7A8C7A;
    --green:#39FF14; --green-deep:#0E8A0E; --green-soft:rgba(57,255,20,.10); --green-line:rgba(57,255,20,.32);
    --red:#FF4D4D; --violet:#A855F7; --gold:#FFD34D;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button,a{font-family:inherit;border:none;cursor:pointer;color:inherit;text-decoration:none}
  #app{max-width:460px;margin:0 auto;min-height:100vh;padding-bottom:30px;
    background:radial-gradient(600px 420px at 50% 0%,rgba(57,255,20,.09),transparent 62%),var(--bg)}

  .hero{margin:14px;padding:18px 16px;border-radius:20px;position:relative;overflow:hidden;text-align:center;
    background:linear-gradient(165deg,rgba(57,255,20,.07),rgba(5,8,5,0) 60%),var(--surf);border:1px solid var(--green-line)}
  .hero-glow{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:300px;height:300px;
    border-radius:50%;background:radial-gradient(circle,rgba(57,255,20,.2),transparent 68%)}
  .cat{position:relative;z-index:2;width:150px;height:auto;aspect-ratio:520/620;
    filter:drop-shadow(0 8px 24px rgba(57,255,20,.25))}
  .hero-title{position:relative;z-index:2;font-size:18px;font-weight:800;margin-top:6px}
  .hero-sub{position:relative;z-index:2;font-size:12.5px;color:var(--txt-lo);margin-top:4px}

  .card{background:var(--surf);border:1px solid var(--line);border-radius:16px}
  .sec{font-size:12px;font-weight:700;color:var(--txt-lo);margin:20px 16px 10px}
  .note{font-size:11px;color:var(--txt-lo);line-height:1.55;margin-top:14px}

  .connect{margin:14px 16px 0;padding:18px}
  .connect-step{display:flex;align-items:center;gap:11px;font-size:14px;font-weight:600;margin-bottom:13px}
  .ok-badge{display:inline-block;padding:9px 14px;border-radius:11px;font-size:14px;font-weight:800;
    color:var(--green);background:var(--green-soft);border:1px solid var(--green-line)}
  .connect-title{font-size:13px;font-weight:800;color:var(--green);margin:0 0 12px}
  .tag.biz{color:#5BC8FF;background:rgba(91,200,255,.12);border:1px solid rgba(91,200,255,.3)}
  .num{width:24px;height:24px;border-radius:8px;flex-shrink:0;background:var(--green-soft);
    border:1px solid var(--green-line);color:var(--green);font-weight:800;font-size:12px;
    display:flex;align-items:center;justify-content:center}

  .btn-green{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:8px;padding:15px;
    background:linear-gradient(135deg,var(--green),var(--green-deep));color:#031003;font-weight:800;
    border-radius:12px;box-shadow:0 6px 20px rgba(57,255,20,.3);font-size:15px}
  .btn-ghost{display:flex;align-items:center;justify-content:center;gap:7px;margin:8px 16px 0;padding:13px;
    background:var(--surf);border:1px solid var(--line);border-radius:12px;font-weight:700;font-size:14px;color:var(--green)}

  .row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;margin:0 16px 8px;padding:13px 14px;
    width:calc(100% - 32px)}
  .ava{width:42px;height:42px;border-radius:50%;flex-shrink:0;background:linear-gradient(150deg,#1E2A1E,#0C120C);
    border:1.5px solid var(--line-lit);display:flex;align-items:center;justify-content:center;font-weight:800}
  .row-main{flex:1;min-width:0}
  .row-title{display:block;font-size:14px;font-weight:700}
  .row-sub{display:block;font-size:11.5px;color:var(--txt-lo);margin-top:2px}
  .row-side{display:flex;gap:6px;flex-shrink:0}
  .tag{font-size:10px;font-weight:800;border-radius:6px;padding:2px 7px}
  .tag.red{color:var(--red);background:rgba(255,77,77,.12);border:1px solid rgba(255,77,77,.3)}
  .tag.violet{color:var(--violet);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3)}
  .tag.warn{color:var(--gold);background:rgba(255,211,77,.12);border:1px solid rgba(255,211,77,.3)}

  .chatbar{display:flex;align-items:center;gap:10px;padding:14px 16px;position:sticky;top:0;z-index:10;
    background:rgba(5,8,5,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
  .back{font-size:26px;line-height:1;color:var(--txt-lo);width:30px}
  .chatbar-title{font-size:15px;font-weight:800}
  .chatbar-sub{font-size:11px;color:var(--txt-lo)}
  .filters{display:flex;gap:7px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;padding:7px 13px;border-radius:99px;font-size:12.5px;font-weight:700;
    border:1px solid var(--line);background:var(--surf);color:var(--txt-lo)}
  .chip.on{border-color:var(--green-line);background:var(--green-soft);color:var(--green)}

  .msg{margin:0 16px 8px;padding:13px}
  .msg.del{border-color:rgba(255,77,77,.3);background:linear-gradient(135deg,rgba(255,77,77,.06),var(--surf))}
  .msg-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .msg-who{font-size:12px;font-weight:700}
  .msg-text{font-size:14px;line-height:1.5}
  .msg-time{font-size:10.5px;color:var(--txt-lo);margin-top:6px}
  .empty{text-align:center;padding:60px 30px;color:var(--txt-lo);font-size:14px;line-height:1.6}

  .spinner{display:flex;gap:6px;justify-content:center;padding:60px}
  .spinner .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.1s infinite ease-in-out}
  .spinner .dot:nth-child(2){animation-delay:.16s}
  .spinner .dot:nth-child(3){animation-delay:.32s}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
  .err{margin:40px 16px;padding:18px;border-radius:14px;background:rgba(255,77,77,.08);
    border:1px solid rgba(255,77,77,.3);color:#FFB4B4;font-size:13.5px;line-height:1.6;text-align:center}

  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>
  <div id="app"></div>
  <script src="/app.js"></script>
</body>
</html>
