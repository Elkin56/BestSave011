<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>BestSave</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050805; --bg-deep:#020402; --surf:#0C120C; --surf-hi:#131B13;
    --line:#1D2A1D; --line-lit:#2A3D2A;
    --txt:#E9F5E9; --txt-lo:#7A8C7A;
    --green:#39FF14; --green-deep:#0E8A0E;
    --green-soft:rgba(57,255,20,.10); --green-line:rgba(57,255,20,.32);
    --gold:#FFD34D; --red:#FF4D4D; --violet:#A855F7; --blue:#3B82F6; --pink:#EC4899;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;overscroll-behavior-y:none}
  body{background:var(--bg);color:var(--txt);font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button,a,input{font-family:inherit;border:none;color:inherit;background:none;text-decoration:none}
  button{cursor:pointer}
  ::-webkit-scrollbar{display:none}

  #app{max-width:460px;margin:0 auto;min-height:100vh;position:relative;
    background:radial-gradient(600px 420px at 50% 0%,rgba(57,255,20,.09),transparent 62%),
      radial-gradient(500px 380px at 100% 40%,rgba(57,255,20,.05),transparent 60%),var(--bg)}
  main{padding-bottom:92px}

  .top{display:flex;align-items:center;gap:10px;padding:14px 16px;position:sticky;top:0;z-index:30;
    background:rgba(5,8,5,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--line)}
  .logo{width:30px;height:30px;border-radius:9px;flex-shrink:0;
    background:linear-gradient(150deg,var(--green),var(--green-deep));
    display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(57,255,20,.5)}
  .brand{font-size:16px;font-weight:800;letter-spacing:-.3px}
  .icon-btn{width:34px;height:34px;border-radius:10px;flex-shrink:0;background:var(--surf);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center}

  .card{background:var(--surf);border:1px solid var(--line);border-radius:16px}
  .sec{font-size:12px;font-weight:700;color:var(--txt-lo);margin:22px 16px 10px;display:flex;align-items:center;gap:8px}
  .note{font-size:11.5px;color:var(--txt-lo);line-height:1.6}
  .div{height:1px;background:var(--line);margin-left:14px}

  .hero{margin:14px 16px 0;padding:16px;border-radius:20px;position:relative;overflow:hidden;text-align:center;
    background:linear-gradient(165deg,rgba(57,255,20,.07),rgba(5,8,5,0) 60%),var(--surf);border:1px solid var(--green-line)}
  .hero-glow{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:300px;height:300px;
    border-radius:50%;background:radial-gradient(circle,rgba(57,255,20,.2),transparent 68%)}
  .cat{position:relative;z-index:2;width:160px;height:auto;aspect-ratio:520/620;
    filter:drop-shadow(0 8px 24px rgba(57,255,20,.25))}
  .hero-sub{position:relative;z-index:2;font-size:12.5px;color:var(--txt-lo)}
  .ok-badge{position:relative;z-index:2;display:inline-block;padding:8px 13px;border-radius:11px;
    font-size:13px;font-weight:800;color:var(--green);background:var(--green-soft);border:1px solid var(--green-line)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 16px}
  .stat{padding:13px;border-radius:14px;background:var(--surf);border:1px solid var(--line)}
  .stat .head{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--txt-lo)}
  .stat .num{font-size:26px;font-weight:800;line-height:1;margin-top:8px;letter-spacing:-.5px}
  .chip{display:flex;align-items:center;justify-content:center;flex-shrink:0;width:22px;height:22px;border-radius:7px}
  .qa{padding:15px;display:flex;flex-direction:column;align-items:flex-start;gap:9px}

  .row{display:flex;align-items:center;gap:11px;padding:12px 14px}
  .row-main{flex:1;min-width:0}
  .row-title{display:block;font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row-sub{display:block;font-size:11.5px;color:var(--txt-lo);margin-top:2px}
  .row-side{display:flex;gap:6px;flex-shrink:0;align-items:center}
  .ava{width:42px;height:42px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(150deg,#1E2A1E,#0C120C);border:1.5px solid var(--line-lit);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--txt-lo)}

  .tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;border-radius:6px;padding:2px 7px}
  .tag.red{color:var(--red);background:rgba(255,77,77,.12);border:1px solid rgba(255,77,77,.3)}
  .tag.violet{color:var(--violet);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3)}
  .tag.biz{color:#5BC8FF;background:rgba(91,200,255,.12);border:1px solid rgba(91,200,255,.3)}
  .tag.gold{color:var(--gold);background:rgba(255,211,77,.12);border:1px solid rgba(255,211,77,.3)}

  .filters{display:flex;gap:7px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip-btn{flex-shrink:0;padding:7px 13px;border-radius:99px;font-size:12.5px;font-weight:700;
    border:1px solid var(--line);background:var(--surf);color:var(--txt-lo)}
  .chip-btn.on{border-color:var(--green-line);background:var(--green-soft);color:var(--green)}

  .msg.del{border-color:rgba(255,77,77,.3);background:linear-gradient(135deg,rgba(255,77,77,.06),var(--surf))}
  .msg-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .msg-who{font-size:12px;font-weight:700}
  .msg-text{font-size:14px;line-height:1.5;word-break:break-word}
  .empty{text-align:center;padding:50px 30px;color:var(--txt-lo);font-size:14px;line-height:1.6}

  .ev{margin:0 16px 10px;padding:15px}
  .ev-head{display:flex;align-items:center;gap:9px;margin-bottom:13px}
  .ev-line{display:flex;gap:10px;padding:9px 0}
  .ev-sub{font-size:11px;color:var(--txt-lo);margin-top:9px;padding-top:9px;border-top:1px solid var(--line);line-height:1.5}
  .delta{font-size:13px;font-weight:800;color:var(--green);background:var(--green-soft);
    border:1px solid var(--green-line);border-radius:7px;padding:3px 8px}

  .connect{padding:18px}
  .connect-title{font-size:13px;font-weight:800;color:var(--green);margin:0 0 12px}
  .connect-step{display:flex;align-items:center;gap:11px;font-size:14px;font-weight:600;margin-bottom:13px}
  .num{width:24px;height:24px;border-radius:8px;flex-shrink:0;background:var(--green-soft);
    border:1px solid var(--green-line);color:var(--green);font-weight:800;font-size:12px;
    display:flex;align-items:center;justify-content:center}

  .btn-green{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:14px;
    background:linear-gradient(135deg,var(--green),var(--green-deep));color:#031003;font-weight:800;
    border-radius:12px;box-shadow:0 6px 20px rgba(57,255,20,.3);font-size:14.5px}
  .btn-ghost{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;
    background:var(--surf);border:1px solid var(--line);border-radius:12px;font-weight:700;
    font-size:13.5px;color:var(--green)}

  .ava-ring{width:76px;height:76px;border-radius:50%;padding:2.5px;
    background:linear-gradient(150deg,var(--green),var(--green-deep));box-shadow:0 0 22px rgba(57,255,20,.35)}
  .ava-letter{width:100%;height:100%;border-radius:50%;background:var(--surf);
    display:flex;align-items:center;justify-content:center;font-size:27px;font-weight:800;color:var(--txt-lo)}
  .tg-badge{position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:50%;
    background:#2AABEE;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center}

  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:40;
    display:flex;background:rgba(5,8,5,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  .tab{flex:1;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--txt-lo);transition:color .18s;position:relative}
  .tab.on{color:var(--green)}
  .tab.on::before{content:"";position:absolute;top:0;width:26px;height:2.5px;background:var(--green);
    border-radius:0 0 3px 3px;box-shadow:0 0 10px var(--green)}
  .tab span{font-size:9.5px;font-weight:700}

  .spinner{display:flex;gap:6px;justify-content:center;padding:60px}
  .spinner i{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.1s infinite ease-in-out}
  .spinner i:nth-child(2){animation-delay:.16s}
  .spinner i:nth-child(3){animation-delay:.32s}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
  .err{margin:40px 16px;padding:18px;border-radius:14px;background:rgba(255,77,77,.08);
    border:1px solid rgba(255,77,77,.3);color:#FFB4B4;font-size:13.5px;line-height:1.6;text-align:center}

  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
  <div id="app">
    <header class="top" id="top"></header>
    <main id="main"></main>
    <nav id="nav"></nav>
  </div>
  <script src="/app.js"></script>
</body>
</html>
