<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>BestSave</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════════════
     BestSave — премиальный игровой визуальный язык.
     Форма из Supercell/Telegram-игр, но БЕЗ азартной метафоры:
     это продукт о приватности. «Награда» — статус защиты и объём
     архива, а не чужие сообщения. Функциональность не меняется —
     переписан только визуальный слой, имена классов сохранены.
     ══════════════════════════════════════════════════════════ */
  :root{
    /* Фон — глубокий сине-фиолетовый градиент из брифа */
    --bg:#120F26; --bg-2:#24134B; --bg-3:#311B5E; --bg-deep:#0C0A1C;

    /* Стекло */
    --glass:rgba(255,255,255,.08);
    --glass-hi:rgba(255,255,255,.13);
    --glass-line:rgba(255,255,255,.14);
    --glass-line-hi:rgba(255,255,255,.24);

    --txt:#F4F1FF; --txt-lo:#A99FD0; --txt-dim:#7E76A8;

    /* Акцентные градиенты */
    --purple:#8B5CF6; --purple-2:#A78BFA;
    --pink:#EC4899;   --pink-2:#F472B6;
    --orange:#FB923C; --orange-2:#FDBA74;
    --green:#34D399;  --green-2:#6EE7B7;
    --cyan:#22D3EE;   --cyan-2:#67E8F9;
    --gold:#FBBF24;   --red:#FB7185; --violet:#A855F7; --blue:#60A5FA;

    --g-purple:linear-gradient(135deg,#A78BFA,#7C3AED);
    --g-pink:linear-gradient(135deg,#F472B6,#DB2777);
    --g-orange:linear-gradient(135deg,#FDBA74,#F97316);
    --g-green:linear-gradient(135deg,#6EE7B7,#059669);
    --g-cyan:linear-gradient(135deg,#67E8F9,#0891B2);
    --g-hero:linear-gradient(135deg,#A78BFA 0%,#EC4899 55%,#FB923C 100%);

    /* Пружины — вся физика через них, никаких linear */
    --spring:cubic-bezier(.34,1.56,.64,1);
    --spring-soft:cubic-bezier(.22,1,.36,1);
    --ease:cubic-bezier(.4,0,.2,1);

    --shadow:0 8px 28px rgba(0,0,0,.38);
    --shadow-lg:0 16px 44px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;overscroll-behavior-y:none}
  body{background:var(--bg-deep);color:var(--txt);
    font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button,a,input{font-family:inherit;border:none;color:inherit;background:none;text-decoration:none}
  button{cursor:pointer}
  ::-webkit-scrollbar{display:none}

  /* Числа и заголовки — округлый геометрический гротеск Nunito */
  .brand,.num,.stat .num,.count-pill,.balance-num,h4,.msg-who,.ev-head span,
  .row-title,.connect-title,.hero-title,.tag,.delta{font-family:'Nunito',sans-serif}
  .num,.count-pill,.row-sub,.delta,.msg-head time,.stat .head,.balance-num,
  .chart-sum,.xlab span{font-variant-numeric:tabular-nums}

  #app{max-width:460px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden;
    background:
      radial-gradient(520px 380px at 12% -4%,rgba(139,92,246,.42),transparent 60%),
      radial-gradient(480px 360px at 100% 8%,rgba(236,72,153,.30),transparent 58%),
      radial-gradient(600px 500px at 50% 108%,rgba(34,211,238,.20),transparent 62%),
      linear-gradient(170deg,var(--bg-3) 0%,var(--bg-2) 42%,var(--bg) 100%)}
  /* Плавающие световые пятна — амбиентная атмосфера */
  #app::before{content:"";position:fixed;inset:0;max-width:460px;margin:0 auto;pointer-events:none;z-index:0;
    background:
      radial-gradient(300px 300px at 84% 22%,rgba(251,146,60,.16),transparent 62%),
      radial-gradient(260px 260px at 8% 60%,rgba(52,211,153,.14),transparent 60%);
    animation:drift 14s var(--ease) infinite alternate}
  @keyframes drift{from{transform:translate3d(0,0,0)}to{transform:translate3d(0,-22px,0)}}
  main{padding-bottom:104px;position:relative;z-index:1}

  /* ── Верхняя панель ── */
  .top{display:flex;align-items:center;gap:11px;padding:16px 20px 14px;position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,rgba(18,15,38,.86),rgba(18,15,38,.5) 78%,transparent);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
  .logo{width:38px;height:38px;border-radius:13px;flex-shrink:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(139,92,246,.5),inset 0 1px 0 rgba(255,255,255,.4)}
  .logo img{width:100%;height:100%;object-fit:cover;border-radius:13px}
  .brand{font-size:19px;font-weight:900;letter-spacing:-.4px}
  .icon-btn{width:40px;height:40px;border-radius:13px;flex-shrink:0;background:var(--glass);
    border:1px solid var(--glass-line);display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    transition:transform .3s var(--spring),background .2s}
  .icon-btn:active{transform:scale(.9)}

  /* ── Карточка-стекло ── */
  .card{background:var(--glass);border:1px solid var(--glass-line);border-radius:26px;
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:var(--shadow)}
  .sec{font-size:12px;font-weight:800;color:var(--txt-lo);letter-spacing:.4px;text-transform:uppercase;
    margin:26px 22px 12px;display:flex;align-items:center;gap:8px}
  .note{font-size:12px;color:var(--txt-lo);line-height:1.65}
  .div{height:1px;background:var(--glass-line);margin-left:16px}

  /* ── Hero: статус защиты ── */
  .hero{margin:6px 16px 0;padding:22px 20px 24px;border-radius:32px;position:relative;overflow:hidden;
    text-align:center;background:var(--g-hero);
    box-shadow:0 18px 46px rgba(124,58,237,.4),inset 0 1px 0 rgba(255,255,255,.35)}
  .hero::after{content:"";position:absolute;inset:0;border-radius:32px;pointer-events:none;
    background:radial-gradient(120% 80% at 50% -10%,rgba(255,255,255,.28),transparent 60%)}
  .hero-glow{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);width:320px;height:320px;
    border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.28),transparent 66%);
    animation:glowPulse 3.4s var(--ease) infinite}
  @keyframes glowPulse{0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:.9;transform:translate(-50%,-50%) scale(1.12)}}
  /* Талисман — мягкое парение + микро-поворот, как idle-анимация в играх */
  .cat{position:relative;z-index:2;width:150px;height:auto;aspect-ratio:520/620;border-radius:24px;
    filter:drop-shadow(0 14px 30px rgba(0,0,0,.4));animation:float 4.2s var(--ease) infinite}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-12px) rotate(1.5deg)}}
  .hero-title{position:relative;z-index:2;font-size:20px;font-weight:900;margin:8px 0 2px;color:#fff;
    letter-spacing:-.4px;text-shadow:0 2px 12px rgba(0,0,0,.25)}
  .hero-sub{position:relative;z-index:2;font-size:13px;color:rgba(255,255,255,.9);font-weight:600}
  .ok-badge{position:relative;z-index:2;display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    padding:10px 18px;border-radius:16px;font-size:14px;font-weight:800;color:#0B3B2E;
    background:rgba(255,255,255,.92);box-shadow:0 6px 18px rgba(0,0,0,.22)}

  /* ── Балансовый счётчик: объём архива ── */
  .balance{margin:14px 16px 0;padding:20px 22px;border-radius:28px;position:relative;overflow:hidden;
    display:flex;align-items:center;gap:16px;background:var(--glass-hi);
    border:1px solid var(--glass-line-hi);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
  .balance-orb{width:54px;height:54px;border-radius:18px;flex-shrink:0;background:var(--g-green);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 22px rgba(5,150,105,.5),inset 0 1px 0 rgba(255,255,255,.4);
    animation:orbPulse 2.8s var(--ease) infinite}
  @keyframes orbPulse{0%,100%{box-shadow:0 8px 22px rgba(5,150,105,.45),inset 0 1px 0 rgba(255,255,255,.4)}
    50%{box-shadow:0 8px 30px rgba(5,150,105,.75),inset 0 1px 0 rgba(255,255,255,.5)}}
  .balance-label{font-size:12px;color:var(--txt-lo);font-weight:700;letter-spacing:.3px}
  .balance-num{font-size:34px;font-weight:900;line-height:1;margin-top:3px;letter-spacing:-1px;
    background:var(--g-green);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .balance-meta{margin-left:auto;text-align:right;font-size:12px;color:var(--txt-lo);font-weight:700}

  /* ── Статы 2×2 ── */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 16px}
  .stat{padding:17px;border-radius:22px;background:var(--glass);border:1px solid var(--glass-line);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:relative;overflow:hidden;
    transition:transform .3s var(--spring)}
  .stat:active{transform:scale(.97)}
  .stat .head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--txt-lo)}
  /* Чистые крупные цифры: заливка текста светлым градиентом, без подложки и glow */
  .stat .num{font-size:38px;font-weight:900;line-height:1;margin-top:12px;letter-spacing:-1.2px;
    color:#fff;background:linear-gradient(180deg,#FFFFFF,#CBBEF6);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    padding:0;box-shadow:none;border-radius:0;width:auto;height:auto;display:block}
  /* 3D-иконка: объёмный скруглённый бейдж с внутренним светом */
  .chip{display:flex;align-items:center;justify-content:center;flex-shrink:0;width:26px;height:26px;
    border-radius:9px;box-shadow:inset 0 1px 0 rgba(255,255,255,.35)}
  .qa{padding:18px;display:flex;flex-direction:column;align-items:flex-start;gap:12px;border-radius:22px;
    transition:transform .3s var(--spring)}
  .qa:active{transform:scale(.96)}

  /* ── Строка списка ── */
  .row{display:flex;align-items:center;gap:13px;padding:14px 16px;transition:background .2s}
  .row:active{background:var(--glass-hi)}
  .row-main{flex:1;min-width:0}
  .row-title{display:block;font-size:15px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row-sub{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;
    color:var(--txt-dim);margin-top:5px;font-weight:600}
  .row-side{display:flex;gap:7px;flex-shrink:0;align-items:center}
  /* Аватар: фото поверх цветной подложки с буквой. Подложка своя у каждого
     чата — иначе список выглядит как ряд одинаковых плиток. */
  .ava{position:relative;width:46px;height:46px;border-radius:16px;flex-shrink:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-family:'Nunito';font-weight:900;
    font-size:17px;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.28)}
  .ava img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

  /* ── Теги ──
     Второстепенная информация: приглушены, чтобы не спорить с названием
     чата. Цвет несёт смысл, но приходит из текста и полупрозрачной
     подложки, а не из плотной заливки. */
  .tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
    border-radius:8px;padding:3px 7px;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.08);color:var(--txt-dim)}
  .tag.red{color:#F9A8C4}
  .tag.violet{color:#C4B5FD}
  .tag.biz{color:#93C5D8}
  .tag.gold{color:#FCD34D}

  /* ── Фильтры-пилюли ── */
  .filters{display:flex;gap:9px;overflow-x:auto;padding:16px 16px 6px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip-btn{flex-shrink:0;padding:10px 17px;border-radius:99px;font-size:13px;font-weight:800;
    border:1px solid var(--glass-line);background:var(--glass);color:var(--txt-lo);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    transition:transform .3s var(--spring),color .2s}
  .chip-btn:active{transform:scale(.93)}
  .chip-btn.on{border-color:transparent;background:var(--g-purple);color:#fff;
    box-shadow:0 6px 16px rgba(124,58,237,.45)}

  /* ── Сообщения ── */
  .msg{border-radius:22px !important}
  .msg.del{border-color:rgba(251,113,133,.4);
    background:linear-gradient(135deg,rgba(251,113,133,.14),var(--glass))}
  /* Закреплённое: тёплая рамка, чтобы находилось взглядом среди тысяч */
  .msg.pinned{border-color:rgba(251,191,36,.5);
    box-shadow:var(--shadow),0 0 0 1px rgba(251,191,36,.2)}
  .pin-btn{width:28px;height:28px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--glass-hi);border:1px solid var(--glass-line);
    transition:transform .3s var(--spring),background .2s}
  .pin-btn:active{transform:scale(.85)}
  .pin-btn.on{background:linear-gradient(135deg,#FCD34D,#F59E0B);border-color:transparent;
    box-shadow:0 4px 12px rgba(245,158,11,.45)}
  mark{background:rgba(251,191,36,.28);color:#FDE68A;border-radius:4px;padding:0 2px;
    font-weight:700}
  .msg-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
  .msg-who{font-size:13px;font-weight:800}
  /* Аватар собеседника: фото перекрывает букву-заглушку; при ошибке
     загрузки <img> удаляется и остаётся буква на градиенте. */
  .msg-ava{position:relative;width:28px;height:28px;border-radius:10px;flex-shrink:0;overflow:hidden;
    background:var(--g-purple);display:flex;align-items:center;justify-content:center;
    font-family:'Nunito';font-weight:900;font-size:13px;color:#fff;
    box-shadow:0 3px 10px rgba(124,58,237,.4),inset 0 1px 0 rgba(255,255,255,.3)}
  .msg-ava img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
  .msg-text{font-size:14.5px;line-height:1.55;word-break:break-word;font-weight:500}
  .empty{text-align:center;padding:56px 32px;color:var(--txt-lo);font-size:14px;line-height:1.7;font-weight:600}

  /* ── События ── */
  .ev{margin:0 16px 12px;padding:18px}
  .ev-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .ev-head span{font-family:'Nunito'}
  .ev-line{display:flex;gap:10px;padding:10px 0}
  .ev-sub{font-size:11.5px;color:var(--txt-lo);margin-top:11px;padding-top:11px;
    border-top:1px solid var(--glass-line);line-height:1.55}
  .delta{font-size:13px;font-weight:900;color:#fff;background:var(--g-green);
    border-radius:10px;padding:4px 10px;box-shadow:0 4px 12px rgba(5,150,105,.35)}

  /* ── Подключение ── */
  .connect{padding:22px;border-radius:26px}
  .connect-title{font-size:15px;font-weight:900;margin:0 0 16px;
    background:var(--g-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .connect-step{display:flex;align-items:center;gap:13px;font-size:14px;font-weight:700;margin-bottom:15px}
  .step-num{width:28px;height:28px;border-radius:10px;flex-shrink:0;background:var(--g-purple);color:#fff;
    font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(124,58,237,.4);font-family:'Nunito'}

  /* ── Кнопки: крупные, градиентные, с glow и spring ── */
  .btn-green{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:17px;
    background:var(--g-green);color:#04231A;font-weight:900;font-size:15.5px;border-radius:18px;
    box-shadow:0 10px 26px rgba(5,150,105,.5),inset 0 1px 0 rgba(255,255,255,.4);
    font-family:'Nunito';transition:transform .35s var(--spring),box-shadow .3s}
  .btn-green:active{transform:scale(.96);box-shadow:0 6px 18px rgba(5,150,105,.6)}
  .btn-ghost{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;
    background:var(--glass);border:1px solid var(--glass-line);border-radius:16px;font-weight:800;
    font-size:14px;color:var(--txt);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    transition:transform .35s var(--spring)}
  .btn-ghost:active{transform:scale(.96)}
  /* Необратимое действие — отдельный вид, чтобы не путать с обычной кнопкой */
  .btn-danger{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;
    background:var(--g-pink);color:#fff;font-weight:900;font-size:14.5px;border-radius:16px;
    font-family:'Nunito';box-shadow:0 8px 22px rgba(219,39,119,.42),inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .35s var(--spring)}
  .btn-danger:active{transform:scale(.96)}

  /* ── Аватар профиля ── */
  .ava-ring{width:84px;height:84px;border-radius:28px;padding:3px;background:var(--g-hero);
    box-shadow:0 10px 28px rgba(236,72,153,.4)}
  .ava-letter{width:100%;height:100%;border-radius:25px;background:var(--bg-2);
    display:flex;align-items:center;justify-content:center;font-family:'Nunito';font-size:30px;
    font-weight:900;color:#fff}
  .ava-ring img{border-radius:25px !important}
  .tg-badge{position:absolute;right:-4px;bottom:-4px;width:30px;height:30px;border-radius:12px;
    background:var(--g-cyan);border:3px solid var(--bg-2);display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(8,145,178,.5)}

  /* ── Нижняя навигация: плавающий стеклянный док ── */
  nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:432px;
    z-index:40;display:flex;padding:8px;gap:2px;border-radius:24px;
    background:rgba(28,20,58,.72);border:1px solid var(--glass-line-hi);
    backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);
    box-shadow:var(--shadow-lg);margin-bottom:env(safe-area-inset-bottom)}
  .tab{flex:1;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:5px;
    color:var(--txt-dim);border-radius:17px;position:relative;
    transition:color .25s,transform .35s var(--spring)}
  .tab:active{transform:scale(.9)}
  .tab.on{color:#fff}
  .tab.on::before{content:"";position:absolute;inset:0;border-radius:17px;z-index:-1;
    background:var(--g-purple);box-shadow:0 6px 18px rgba(124,58,237,.5);
    animation:tabPop .4s var(--spring)}
  @keyframes tabPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .tab span{font-size:10px;font-weight:800}

  /* ── Поиск ── */
  .search{display:flex;align-items:center;gap:11px;margin:16px 16px 0;padding:0 16px;height:50px;
    background:var(--glass);border:1px solid var(--glass-line);border-radius:18px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  .search input{flex:1;height:100%;font-size:15px;outline:none;color:var(--txt);font-weight:600}
  .search input::placeholder{color:var(--txt-dim)}

  /* ── Тумблер ── */
  .toggle{position:relative;width:52px;height:30px;border-radius:99px;flex-shrink:0;
    background:var(--glass-hi);border:1px solid var(--glass-line);
    transition:background .3s var(--spring),border-color .3s}
  .toggle::after{content:"";position:absolute;left:3px;top:3px;width:22px;height:22px;border-radius:50%;
    background:var(--txt-dim);transition:transform .35s var(--spring),background .3s}
  .toggle.on{background:var(--g-green);border-color:transparent}
  .toggle.on::after{transform:translateX(22px);background:#fff}

  /* ── Медиа ── */
  /* Счётчик сообщений: справочное число, а не акцент. Плотная заливка
     перетягивала внимание с названия чата. */
  .count-pill{flex-shrink:0;min-width:34px;text-align:center;padding:4px 9px;border-radius:9px;
    font-size:12.5px;font-weight:700;color:var(--txt-lo);
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07)}
  .msg-media{margin-top:11px}
  .msg-media img{max-width:100%;max-height:340px;border-radius:16px;display:block;border:1px solid var(--glass-line)}
  .msg-media audio{width:100%;height:40px;display:block}
  .msg-media video{max-width:100%;max-height:340px;border-radius:16px;display:block}
  .msg-media video.round{width:210px;height:210px;border-radius:50%;object-fit:cover}
  .media-miss{font-size:12px;color:var(--txt-dim);margin-top:8px;font-style:italic}

  /* ── Графики ── */
  .chart{margin:0 16px 12px;padding:18px;background:var(--glass);border:1px solid var(--glass-line);
    border-radius:22px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  .chart h4{font-size:12px;font-weight:800;color:var(--txt-lo);letter-spacing:.4px;
    text-transform:uppercase;margin-bottom:14px}
  .bars{display:flex;align-items:flex-end;gap:3px;height:100px}
  .bar{flex:1;min-width:0;background:linear-gradient(180deg,var(--purple-2),rgba(124,58,237,.35));
    border-radius:6px 6px 3px 3px;position:relative;transition:height .5s var(--spring)}
  .bar.peak{background:var(--g-pink);box-shadow:0 0 14px rgba(236,72,153,.5)}
  .bar.zero{background:var(--glass-hi)}
  .xlab{display:flex;gap:3px;margin-top:8px}
  .xlab span{flex:1;min-width:0;text-align:center;font-size:9.5px;color:var(--txt-dim);overflow:hidden;font-weight:700}
  .chart-sum{font-size:12px;color:var(--txt-lo);margin-top:11px;font-weight:600}

  /* ── Фейк-контроль ── */
  .fake{display:flex;gap:8px;align-items:flex-start;margin-top:11px;padding:10px 13px;
    background:linear-gradient(135deg,rgba(251,146,60,.16),rgba(251,146,60,.06));
    border:1px solid rgba(251,146,60,.34);border-radius:14px;font-size:12px;color:var(--orange-2);
    line-height:1.5;font-weight:600}

  /* ── Спиннер и ошибки ── */
  .spinner{display:flex;gap:8px;justify-content:center;padding:70px}
  .spinner i{width:11px;height:11px;border-radius:50%;background:var(--g-hero);
    animation:bounce 1.1s infinite var(--spring)}
  .spinner i:nth-child(2){animation-delay:.16s}
  .spinner i:nth-child(3){animation-delay:.32s}
  @keyframes bounce{0%,100%{transform:translateY(0) scale(.85);opacity:.4}50%{transform:translateY(-12px) scale(1);opacity:1}}
  .err{margin:40px 16px;padding:22px;border-radius:22px;
    background:linear-gradient(135deg,rgba(251,113,133,.16),var(--glass));
    border:1px solid rgba(251,113,133,.34);color:#FFC9D1;font-size:14px;line-height:1.65;
    text-align:center;font-weight:600}

  /* ── Анимации входа: fade + move up + stagger ── */
  main > *{animation:screenIn .45s var(--spring-soft) both}
  @keyframes screenIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .stagger{animation:cardIn .5s var(--spring-soft) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.01ms !important;transition-duration:.01ms !important;animation-iteration-count:1 !important}
    .cat,.hero-glow,.balance-orb,#app::before{animation:none !important}
  }
</style>
</head>
<body>
  <div id="app">
    <header class="top" id="top"></header>
    <main id="main"></main>
    <nav id="nav"></nav>
  </div>
  <script src="/app.js"></script>
</body>
</html>
